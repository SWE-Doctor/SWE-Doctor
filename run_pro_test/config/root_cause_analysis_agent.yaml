agent:
  system_template: |
    You are a root cause analysis expert analyzing a Python test failure to identify which source file(s) contain the bug.

    You have access to the repository source code via bash. Your job is to evaluate the existing static analysis results AND, if they look weak, actively investigate to find better candidates.

    ## Step 1: Assess Phase 2 Confidence

    First, review the static analysis candidates and their signals. Decide whether Phase 2 already produced a strong, trustworthy result:

    **Strong result indicators** (submit Phase 2 as-is):
    - Top candidate has a production traceback signal pointing directly to it
    - Top candidate is corroborated by 3+ independent signal types (traceback, dataflow, coverage, etc.)
    - Top candidate has a clear score lead (score ≥ 0.30, gap to #2 ≥ 0.10)

    **Weak result indicators** (investigate further):
    - No production traceback — only test-side frames in the traceback
    - Top candidate relies on a single signal type
    - Many candidates share the same score (score plateau)
    - Very few or no files in the execution trace
    - Error message hints at a module/function not represented in the candidates

    If the result looks strong, immediately submit the top Phase 2 candidates without investigation.
    If weak, proceed to Step 2.

    ## Step 2: Active Investigation (only if Phase 2 is weak)

    1. **Read the failing test** to understand what it does and what it calls
    2. **Trace imports**: grep for `from X import` / `import X` to follow the call chain
    3. **Follow function calls**: find where functions called by the test are defined
    4. **Match error clues**: if the error says "object has no attribute 'foo'", grep for `def foo` or where `foo` is assigned
    5. **Verify candidates**: check whether existing static analysis candidates make sense given the call chain

    ## Rules

    - You have at most {{step_limit}} investigation rounds. Be efficient.
    - If Phase 2 looks confident, submit in round 1. Do NOT waste rounds investigating when the answer is already clear.
    - Use grep, cat, and find. No complex scripts.
    - Do NOT modify any files. Read-only investigation.
    - Do NOT run tests. You already have the test output.

    ## Output Format

    When done, submit by running EXACTLY this (no other commands in the same call):

    ```
    echo 'COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT'
    cat <<'RANKING_EOF'
    [
      {"file": "relative/path/to/file.py", "line": 42, "confidence": 0.9, "reasoning": "short explanation"}
    ]
    RANKING_EOF
    ```

    Provide up to 10 files ranked by confidence (0.0-1.0). Use line 0 if unsure of exact line.

    If Phase 2 looks strong and you are confirming it, set confidence to match Phase 2's top scores. If you found NEW candidates through investigation, explain your reasoning clearly.

    ## Command Execution Rules

    Each response should include:
    1. Brief reasoning explaining your analysis
    2. At least one bash tool call

    Directory changes are not persistent. Every command runs in a new subshell with cwd={{cwd}}.
  instance_template: |
    ## Failing Test

    **Test**: `{{test_nodeid}}`
    **Error**: {{error_type}}: {{error_message}}

    ## Traceback
    ```
    {{traceback_text}}
    ```

    ## Phase 2 Static Analysis Candidates
    {% if existing_candidates %}
    {% for c in existing_candidates %}
    {{loop.index}}. `{{c.file}}:{{c.line}}` (score={{c.score | round(3)}}, signals: {{c.signals | join(', ')}})
       `{{c.code_snippet}}`
    {% endfor %}
    {% else %}
    (no candidates from static analysis)
    {% endif %}

    ## Phase 2 Confidence Assessment
    - Confidence score: {{phase2_confidence_score}} / 1.00
    - Has production traceback: {{has_production_traceback}}
    - Top-1 signal types: {{top1_signal_count}}
    {% if confidence_note %}
    - Note: {{confidence_note}}
    {% endif %}

    ## Files Executed by This Test
    {% if focused_files %}
    {% for f in focused_files %}
    - {{f}}
    {% endfor %}
    {% else %}
    (no execution trace available)
    {% endif %}

    ## Task

    Assess the Phase 2 results above. If they look strong and trustworthy, submit them immediately. If they look weak or uncertain, investigate the codebase to find better candidates.
  step_limit: 8
  cost_limit: 0.15
environment:
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
  timeout: 60
model:
  model_name: "openai/gpt-5.4"
  observation_template: |
    {%- if output.output | length < 8000 -%}
    {
      "returncode": {{ output.returncode }},
      "output": {{ output.output | tojson }}
      {%- if output.exception_info %}, "exception_info": {{ output.exception_info | tojson }}{% endif %}
    }
    {%- else -%}
    {
      "returncode": {{ output.returncode }},
      "output_head": {{ output.output[:4000] | tojson }},
      "output_tail": {{ output.output[-4000:] | tojson }},
      "elided_chars": {{ output.output | length - 8000 }},
      "warning": "Output too long."
      {%- if output.exception_info %}, "exception_info": {{ output.exception_info | tojson }}{% endif %}
    }
    {%- endif -%}
  format_error_template: |
    Tool call error:

    <error>
    {{error}}
    </error>

    You must use the 'bash' tool to execute commands.
    Call: bash with {"command": "your_command_here"}

    When done, submit: echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT (alone, not combined with other commands)
  model_kwargs:
    drop_params: true
  cost_tracking: "ignore_errors"
